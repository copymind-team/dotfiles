name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          SUPABASE_VERSION=$(gh release view --repo supabase/cli --json tagName -q '.tagName' | sed 's/^v//')
          if [[ -z "$SUPABASE_VERSION" ]]; then
            echo "Failed to resolve latest supabase/cli version" >&2
            exit 1
          fi
          curl -fsSL "https://github.com/supabase/cli/releases/download/v${SUPABASE_VERSION}/supabase_${SUPABASE_VERSION}_linux_amd64.deb" -o supabase.deb
          sudo dpkg -i supabase.deb
          rm supabase.deb
          supabase --version

      - name: Install pgflow CLI
        # Required for the dev-sb-flow success-path e2e test, which runs
        # real `npx pgflow compile` to produce migrations + worker files.
        run: |
          set -euo pipefail
          npm install -g pgflow@0.14.1
          pgflow --version || true

      - name: Run tests
        run: ./test.sh
